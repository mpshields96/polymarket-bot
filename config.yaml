# polymarket-bot configuration
# All tunable params live here. Hard safety floors are enforced in code — config cannot override them.
# ═══════════════════════════════════════════════════════════════

# ── Kalshi platform ────────────────────────────────────────────
kalshi:
  mode: demo                            # Start here. Change to "live" manually (never by code).
  demo_url: https://api.elections.kalshi.com/trade-api/v2
  live_url: https://api.elections.kalshi.com/trade-api/v2
  demo_ws_url: wss://api.elections.kalshi.com
  live_ws_url: wss://api.elections.kalshi.com
  read_rate_limit: 10                   # requests/second (Kalshi limit)
  write_rate_limit: 5                   # requests/second (Kalshi limit)
  request_timeout: 10                   # seconds
  max_retries: 3

# ── Polymarket platform ─────────────────────────────────────────
polymarket:
  enabled: false                        # Enable when off waitlist. Never change automatically.
  clob_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  chain_id: 137                         # Polygon mainnet

# ── Data feeds ──────────────────────────────────────────────────
feeds:
  binance_ws_url: wss://stream.binance.us:9443/ws/btcusdt@bookTicker  # @trade has 0 volume on Binance.US
  btc_window_seconds: 60               # Rolling window for move detection
  eth_ws_url: wss://stream.binance.us:9443/ws/ethusdt@bookTicker      # ETH feed — same bookTicker approach
  eth_window_seconds: 60               # Rolling window for ETH move detection
  sol_ws_url: wss://stream.binance.us:9443/ws/solusdt@bookTicker      # SOL feed — confirmed on Binance.US
  sol_window_seconds: 60               # Rolling window for SOL move detection
  reconnect_delay: 5                   # Seconds before reconnecting on disconnect

# ── Strategy ────────────────────────────────────────────────────
strategy:
  active: btc_lag                      # Only this. Expand after proven.
  markets:
    - KXBTC15M                         # Kalshi BTC 15-min series ticker (confirmed live)
  eth_markets:
    - KXETH15M                         # Kalshi ETH 15-min series ticker (confirmed live)

  btc_lag:
    # SIGNAL CALIBRATION:
    # A signal fires ONLY when ALL gates pass. The binding constraint is min_edge_pct.
    # At min_edge=6% and a 50¢ Kalshi price: need BTC to move ~0.48% in 60s.
    # (formula: need (btc_move * lag_sensitivity/100) > min_edge + kalshi_fee(price))
    # Typical BTC 60s move: 0.02-0.05% (calm), 0.3-1%+ (volatile/news events).
    # Backtest sweep (30d): 0.08=84.1%acc/1.5/day | 0.06=77.9%/3/day | 0.04=77.1%/8/day
    # Lowered 0.08→0.06 on 2026-02-28; lowered 0.06→0.04 on 2026-02-28: ~8 signals/day, 77.1% acc
    min_btc_move_pct: 0.4              # BTC must move this % in btc_window_seconds
    min_kalshi_lag_cents: 5            # Kalshi price must lag spot by this many cents
    min_minutes_remaining: 5           # Don't enter with < 5 min left in window
    min_edge_pct: 0.04                 # Only trade if edge > 4% (after fees) — was 0.06
    lag_sensitivity: 15.0              # Cents of YES/NO price move implied per 1% BTC move

  btc_drift:
    # LIVE (btc_drift_v1) MICRO-LIVE CALIBRATION — unlocking signal flow for data collection.
    # History of threshold changes (ordered):
    #   Original (Session 22):   min_edge=0.05, min_drift=0.05
    #   Tightened (Session 25):  min_edge=0.08, min_drift=0.10 — with only ~12 live trades (premature)
    #   Calibration (Session 35): min_edge=0.05, min_drift=0.05 — RESTORED to original.
    #     Reason: 1 bet/day in calibration mode is a trap. Need 10-15/day to reach 30 bets
    #     for valid Brier score. At $0.50/bet, lowering thresholds adds ~$5-10/day of exposure.
    #     Math: at 0.05% drift with sensitivity=800 → raw_prob≈0.599 → edge≈8.1% YES edge.
    #     Signals with 5-8% edge already firing in logs but being rejected by old 8% floor.
    #     PRINCIPLES.md note: the Session 25 tightening itself lacked 30 data points.
    #     Do NOT re-tighten until 30+ settled live bets + Brier score computed.
    sensitivity: 800.0               # Sigmoid steepness — calibrated from 30d backtest
    min_drift_pct: 0.05              # BTC must drift ≥ 0.05% from market open (restored from 0.10)
    min_minutes_remaining: 3.0       # Don't enter with ≤ 3 min left
    min_edge_pct: 0.05               # Net edge > 5% (restored from 0.08 — was original value)
    time_weight: 0.7                 # How much time remaining blends probability (0=ignore, 1=full)

  eth_lag:
    # ETH lag strategy — LIVE mode as of 2026-02-28 (same executor path as btc_lag).
    # ETH is more volatile than BTC; may need lower lag_sensitivity after calibration.
    # Lowered 0.08→0.06 on 2026-02-28; set to 0.04 on 2026-02-28 to match btc_lag live threshold.
    min_btc_move_pct: 0.4              # ETH must move this % in eth_window_seconds
    min_kalshi_lag_cents: 5
    min_minutes_remaining: 5
    min_edge_pct: 0.04                 # Lowered to 0.04 — matches btc_lag live threshold
    lag_sensitivity: 15.0             # Same as BTC until we have calibration data

  eth_drift:
    # ETH drift strategy — MICRO-LIVE (Session 36), mirrors btc_drift params.
    sensitivity: 800.0
    min_drift_pct: 0.05
    min_minutes_remaining: 3.0
    min_edge_pct: 0.05
    time_weight: 0.7

  sol_drift:
    # SOL drift strategy — MICRO-LIVE (Session 36), same BTCDriftStrategy on SOL feed.
    # SOL ~3x more volatile than BTC → min_drift_pct scaled up 3x (0.05 * 3 = 0.15%)
    # to maintain same signal quality bar (similar edge_pct distribution to btc_drift).
    # At 0.15% SOL drift + sensitivity=800: raw_prob≈0.599, edge≈8.1% (same as btc_drift at 0.05%).
    # KXSOL15M series. 1 contract/bet ~$0.35-0.65. Do NOT lower min_drift_pct without 30+ live bets.
    sensitivity: 800.0
    min_drift_pct: 0.15      # 3x btc_drift (SOL 3x more volatile)
    min_minutes_remaining: 3.0
    min_edge_pct: 0.05
    time_weight: 0.7

  orderbook_imbalance:
    # VPIN-lite orderbook imbalance strategy — paper-only, any market.
    # Fires when YES/NO bid depth is lopsided (smart money detection).
    # Theory: large bid imbalance → informed traders are on that side.
    # Reference: PIN model (Easley, Kiefer, O'Hara 1996)
    # Adapted from: vortexpixelz/Kalshi-smart-money (VPIN model)
    min_imbalance_ratio: 0.65     # >65% YES depth → buy YES; <35% → buy NO
    min_total_depth: 50           # Skip thin markets (< 50 total contracts)
    depth_top_n: 10               # Only consider top 10 price levels
    min_edge_pct: 0.05            # 5% edge required after fees
    min_minutes_remaining: 3.0
    signal_scaling: 1.0           # Scale imbalance→probability mapping

  weather:
    # Weather forecast vs Kalshi temperature market strategy — paper-only.
    # Compares Open-Meteo GFS daily high-temp forecast to Kalshi NYC weather markets.
    # Fires when normal-distribution model probability diverges from market price.
    # Theory: weather models (NWP) are typically more accurate than prediction markets
    #         especially 24-48h ahead when market prices reflect outdated info.
    # Reference: jazzmine-p/weather-forecast-automated-trading (LSTM + NCEI, +20% in 1 week)
    city: nyc                        # Start with NYC (HIGHNY-* series). Add more after calibration.
    series_ticker: HIGHNY            # Kalshi event series prefix for NYC daily high-temp markets
    forecast_std_f: 3.5              # Forecast uncertainty in °F (typical 1-day NWP MAE)
    min_edge_pct: 0.05               # 5% net edge required after Kalshi fee
    min_minutes_remaining: 30.0      # Don't enter with < 30 min left in market window
    min_confidence: 0.60             # Model must assign < 40% or > 60% to YES side
    refresh_interval_seconds: 1800   # Refresh Open-Meteo forecast every 30 minutes

  fomc:
    # FOMC Fed rate decision strategy — paper-only.
    # Compares 2yr yield curve signal (FRED) to Kalshi KXFEDDECISION market prices.
    # Only fires within days_before_meeting days of the next scheduled FOMC decision.
    # Reference: Federal Reserve working paper Jan 2026 — perfect day-before track record.
    # Data: FRED CSV endpoint (free, no API key: fred.stlouisfed.org/graph/fredgraph.csv)
    min_edge_pct: 0.05              # 5% net edge required after Kalshi fee
    min_minutes_remaining: 60.0     # Don't enter within 60 min of market close
    days_before_meeting: 14         # Only run in 14-day window before each FOMC date
    spread_hold_band: 0.25          # ±0.25% 2yr-DFF spread = hold regime
    cpi_adjustment: 0.08            # 8% shift between hold/cut on CPI trend
    fred_refresh_interval_seconds: 3600   # Refresh FRED data every hour

  unemployment:
    # Unemployment rate vs Kalshi KXUNRATE market strategy — paper-only.
    # Compares BLS Employment Situation forecast (linear trend on last 3 UNRATE readings)
    # to Kalshi KXUNRATE market prices. Active 7 days before each monthly BLS release.
    # Data: FRED CSV UNRATE series (free, no API key).
    # BLS 2026 release dates: Jan 9, Feb 7, Mar 7, Apr 3, May 1, Jun 5, Jul 3, Aug 7, Sep 4, Oct 2, Nov 6, Dec 4
    series_ticker: KXUNRATE          # Kalshi unemployment rate series prefix
    days_before_release: 7           # Active window: 7 days before each BLS release
    min_edge_pct: 0.05               # 5% net edge required after Kalshi fee
    min_minutes_remaining: 60.0      # Don't enter with < 60 min left in market window
    uncertainty_band: 0.2            # ±0.2pp normal distribution width for forecast
    fred_refresh_interval_seconds: 3600   # Reuse shared FRED feed interval

  sol_lag:
    # SOL 15-min lag strategy — paper-only, KXSOL15M series.
    # SOL is ~3x more volatile than BTC — higher move threshold to avoid noise.
    # Uses same BTCLagStrategy class, CF Benchmarks SOLUSD_RTI for settlement.
    # Parameters are conservative starting points; recalibrate after 30+ paper trades.
    min_btc_move_pct: 0.8              # SOL must move this % in 60s (higher than BTC's 0.4%)
    min_kalshi_lag_cents: 5
    min_minutes_remaining: 5
    min_edge_pct: 0.04                 # Same 4% edge threshold as btc_lag
    lag_sensitivity: 15.0              # Calibrate after paper data collected

  sports_game:
    # NBA + NHL game-winner vs sharp bookmaker consensus — paper-only until SDATA_KEY is set.
    # Data: external sports feed v4 — requires SDATA_KEY in .env
    # Budget: hard cap 500 credits/month — enforced by _QuotaGuard (resets monthly)
    # Series: KXNBAGAME (38 markets, up to 1.35M volume), KXNHLGAME (48 markets)
    # Signal: Kalshi implied prob vs sharp-book consensus → bet when edge > min_edge_pct
    enabled: false                     # Set true after SDATA_KEY confirmed + 30 paper trades
    min_edge_pct: 0.05                 # 5% net edge required (after Kalshi ~7% fee)
    min_minutes_remaining: 15.0        # Don't enter with < 15 min to game start
    min_books: 2                       # Require ≥ 2 bookmakers in consensus
    min_volume: 100                    # Skip Kalshi markets with < 100 volume
    refresh_interval_seconds: 900      # Refresh feed every 15 min (cache level)

  crypto_daily:
    # BTC/ETH/SOL hourly fixed-time markets (KXBTCD/KXETHD/KXSOLD) — paper-only.
    # Each series has 24 hourly settlement slots per day.
    # Strategy: find ATM market in 30min-6hr window, bet on intraday drift direction.
    # Model blends session drift momentum (70%) + lognormal position (30%).
    min_drift_pct: 0.005           # Asset must drift ≥ 0.5% from session open to fire
    min_edge_pct: 0.04             # 4% net edge required after Kalshi fee
    min_minutes_remaining: 30.0    # Skip markets settling in < 30 min
    max_minutes_remaining: 360.0   # Skip markets settling > 6hr out (too much uncertainty)
    min_volume: 100                # Skip thin markets

  whale_copy:                          # Polymarket only — inactive until off waitlist
    enabled: false
    min_win_rate: 0.62                 # Only copy whales with 62%+ win rate
    min_trades: 50                     # Must have 50+ trades to qualify
    copy_ratio: 0.02                   # Bet 2% of what they bet
    max_bet_usd: 5.00                  # Never exceed this regardless of copy_ratio

# ── Risk — hard floors enforced in code, config cannot override ──
risk:
  # Populated at runtime from USER_CONFIG.json
  starting_bankroll_usd: 100.00        # Updated Session 21: $25 added, clean $100 base bankroll

  # Per-trade caps (LOWER of usd and pct always applies)
  max_single_trade_usd: 5.00           # Hard cap: $5 per bet (Stage 1)
  max_single_trade_pct: 0.05           # Hard cap: 5% of bankroll

  # Daily limits
  daily_loss_limit_pct: 0.15           # Stop if down 15% of starting bankroll today
  daily_loss_resets_midnight: true     # Soft kill auto-resets at midnight

  # Consecutive loss protection
  consecutive_loss_pause: 5            # N losses in a row → pause
  consecutive_loss_cooldown_hours: 2   # Resume after this long

  # Rate limiting
  max_hourly_trades: 15                # Trades per hour before rate pause
  max_daily_bets_live: 10             # Live bets per strategy per UTC day — keeps tax forms manageable
  max_daily_bets_paper: 35            # Paper bets per strategy per day — graduates in 1 day (need 30 trades)
  paper_slippage_ticks: 3              # Raised 2→3 (Session 32): upper end of confirmed 2-3¢ Kalshi BTC spread
  paper_fill_probability: 0.85         # 85% fill rate: 15% no-fill simulates market movement between signal and order

  # Hard stops (require manual --reset-killswitch)
  hard_stop_loss_pct: 0.30             # Lose 30% total → HARD STOP
  min_bankroll_usd: 20.00             # Below $20 → HARD STOP

  # Auth failure protection
  max_auth_failures: 3                 # Consecutive auth failures → halt

# ── Stage-based sizing ───────────────────────────────────────────
stages:
  "1":
    range: [0, 100]
    max_bet_usd: 5.00
    max_pct: 0.05
  "2":
    range: [100, 250]
    max_bet_usd: 10.00
    max_pct: 0.05
  "3":
    range: [250, 9999]
    max_bet_usd: 15.00
    max_pct: 0.04
  upgrade_requires_profitable_stage: true
  upgrade_requires_min_live_trades: 30
  kelly_fraction: 0.25                 # Conservative 1/4 Kelly

# ── Dashboard ────────────────────────────────────────────────────
dashboard:
  port: 8501
  host: "127.0.0.1"                   # Localhost ONLY. Never 0.0.0.0.
  refresh_seconds: 30
  tip_rotation_seconds: 60
  max_open_positions_shown: 5
  max_recent_trades_shown: 10

# ── Storage ──────────────────────────────────────────────────────
storage:
  db_path: data/polybot.db

# ── Logging ──────────────────────────────────────────────────────
logging:
  level: INFO
  trades_dir: logs/trades
  errors_dir: logs/errors
  rotate_daily: true
